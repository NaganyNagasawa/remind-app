<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f11">
<title>Remind — リマインダー</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e22;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #9a9690;
    --text3: #5a5855;
    --accent: #e8c97a;
    --accent2: #c4a44e;
    --accent-bg: rgba(232,201,122,0.1);
    --red: #e87a7a;
    --red-bg: rgba(232,122,122,0.1);
    --green: #7ae8a4;
    --green-bg: rgba(122,232,164,0.1);
    --blue: #7aaee8;
    --blue-bg: rgba(122,174,232,0.1);
    --purple: #b07ae8;
    --purple-bg: rgba(176,122,232,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== LAYOUT ===== */
  .app-shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 700px) {
    .app-shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 100; }
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    gap: 8px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
    padding: 0 8px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .logo span { color: var(--text2); font-style: italic; font-size: 13px; font-family: 'DM Sans', sans-serif; display: block; margin-top: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    color: var(--text2);
    transition: all 0.15s;
    border: 1px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent); border-color: rgba(232,201,122,0.2); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text3); padding: 12px 12px 4px; margin-top: 8px;
  }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ===== MAIN ===== */
  .main {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 400; cursor: pointer;
    border: none; transition: all 0.15s; font-family: inherit;
  }
  .btn-primary {
    background: var(--accent); color: #0f0f11; font-weight: 500;
  }
  .btn-primary:hover { background: #f0d98a; }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }

  /* ===== CONTENT ===== */
  .content { flex: 1; padding: 32px; }
  .reminders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ===== REMINDER CARD ===== */
  .reminder-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .reminder-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .reminder-card.done { opacity: 0.45; }
  .reminder-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent, var(--accent));
    border-radius: 3px 0 0 3px;
  }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-title {
    font-size: 15px; font-weight: 400; color: var(--text);
    line-height: 1.4;
  }
  .card-title.done { text-decoration: line-through; color: var(--text3); }
  .card-check {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px solid var(--border2);
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-top: 1px;
    background: transparent;
    color: transparent; font-size: 11px;
  }
  .card-check:hover { border-color: var(--accent); }
  .card-check.checked { background: var(--accent); border-color: var(--accent); color: #0f0f11; }
  .card-meta { margin-top: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    font-weight: 400;
  }
  .badge-time { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .badge-repeat { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(122,174,232,0.2); }
  .badge-cat {
    border: 1px solid transparent;
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
  }
  .card-actions {
    position: absolute; top: 14px; right: 14px;
    display: flex; gap: 4px;
    opacity: 0; transition: opacity 0.15s;
  }
  .reminder-card:hover .card-actions { opacity: 1; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--red-bg); color: var(--red); border-color: rgba(232,122,122,0.3); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px;
    padding: 80px 20px; text-align: center;
    grid-column: 1 / -1;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text2); }
  .empty-sub { font-size: 14px; color: var(--text3); }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 16px; width: 100%; max-width: 480px;
    padding: 28px; display: flex; flex-direction: column; gap: 20px;
    transform: translateY(12px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
  .form-input, .form-select, .form-textarea {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 300;
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }
  .form-select option { background: var(--bg3); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ===== SETUP BANNER ===== */
  .setup-banner {
    margin: 0 32px 24px;
    background: var(--accent-bg);
    border: 1px solid rgba(232,201,122,0.25);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .setup-banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .setup-banner-body { flex: 1; }
  .setup-banner-title { font-size: 14px; font-weight: 500; color: var(--accent); margin-bottom: 4px; }
  .setup-banner-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .setup-banner-text code {
    background: var(--bg3); padding: 1px 6px; border-radius: 4px;
    font-family: monospace; font-size: 12px; color: var(--text);
  }

  /* ===== NOTIFICATION STATUS ===== */
  .notif-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text3);
  }
  .notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .notif-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex; gap: 24px; padding: 0 32px 24px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text3); }

  /* ===== TOAST ===== */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 500; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 13px; color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideIn 0.2s ease;
    display: flex; align-items: center; gap: 8px;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

  /* ===== FILTER TABS ===== */
  .filter-tabs { display: flex; gap: 4px; padding: 0 32px 20px; }
  .filter-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; border: 1px solid var(--border);
    color: var(--text2); background: transparent; transition: all 0.15s;
    font-family: inherit;
  }
  .filter-tab:hover { border-color: var(--border2); color: var(--text); }
  .filter-tab.active { background: var(--accent-bg); border-color: rgba(232,201,122,0.3); color: var(--accent); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>

<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      Remind
      <span>リマインダー</span>
    </div>

    <div class="nav-item active" onclick="filterView('all')">
      <span class="icon">📋</span> すべて
    </div>
    <div class="nav-item" onclick="filterView('today')">
      <span class="icon">☀️</span> 今日
    </div>
    <div class="nav-item" onclick="filterView('upcoming')">
      <span class="icon">📅</span> 近日中
    </div>
    <div class="nav-item" onclick="filterView('done')">
      <span class="icon">✅</span> 完了済み
    </div>

    <div class="nav-section-label">カテゴリ</div>
    <div class="nav-item" onclick="filterCategory('仕事')">
      <span class="cat-dot" style="background:#7aaee8"></span> 仕事
    </div>
    <div class="nav-item" onclick="filterCategory('プライベート')">
      <span class="cat-dot" style="background:#7ae8a4"></span> プライベート
    </div>
    <div class="nav-item" onclick="filterCategory('健康')">
      <span class="cat-dot" style="background:#e87a7a"></span> 健康
    </div>
    <div class="nav-item" onclick="filterCategory('その他')">
      <span class="cat-dot" style="background:#b07ae8"></span> その他
    </div>

    <div class="sidebar-bottom">
      <div class="notif-status">
        <span class="notif-dot" id="notifDot"></span>
        <span id="notifLabel">通知: 未設定</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="viewTitle">すべてのリマインダー</div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="requestNotifPermission()">🔔 ブラウザ通知を有効化</button>
        <button class="btn btn-primary" onclick="openModal()">＋ 追加</button>
      </div>
    </div>

    <!-- SETUP BANNER -->
    <div class="setup-banner" id="setupBanner">
      <div class="setup-banner-icon">⚙️</div>
      <div class="setup-banner-body">
        <div class="setup-banner-title">セットアップが必要です</div>
        <div class="setup-banner-text">
          <code>config.js</code> を開いて、SupabaseのURL・APIキーとOneSignalのApp IDを設定してください。
          設定済みの場合はこのバナーを閉じてください。
        </div>
      </div>
      <button class="icon-btn" onclick="document.getElementById('setupBanner').style.display='none'" style="flex-shrink:0">✕</button>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">合計</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statToday">0</div>
        <div class="stat-label">今日</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-label">完了</div>
      </div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">すべて</button>
      <button class="filter-tab" onclick="setFilter('pending', this)">未完了</button>
      <button class="filter-tab" onclick="setFilter('today', this)">今日</button>
      <button class="filter-tab" onclick="setFilter('done', this)">完了</button>
    </div>

    <!-- CARDS -->
    <div class="content">
      <div class="reminders-grid" id="cardGrid"></div>
    </div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新しいリマインダー</div>

    <div class="form-group">
      <label class="form-label">タイトル</label>
      <input class="form-input" id="fTitle" type="text" placeholder="何をリマインドしますか？">
    </div>

    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <textarea class="form-textarea" id="fNote" placeholder="詳細メモ…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" id="fDate" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">時刻</label>
        <input class="form-input" id="fTime" type="time">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">繰り返し</label>
        <select class="form-select" id="fRepeat">
          <option value="none">なし</option>
          <option value="daily">毎日</option>
          <option value="weekdays">平日のみ</option>
          <option value="weekly">毎週</option>
          <option value="monthly">毎月</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="fCategory">
          <option value="仕事">仕事</option>
          <option value="プライベート">プライベート</option>
          <option value="健康">健康</option>
          <option value="その他">その他</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveReminder()">保存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- CONFIG (要編集) -->
<script src="config.js"></script>

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== SUPABASE INIT =====
let supabase = null;
let useLocalStorage = true;

if (typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    useLocalStorage = false;
  } catch(e) { console.warn('Supabase init failed, using localStorage', e); }
}

// ===== NTFY.SH 通知送信 =====
async function sendNtfyNotification(title, body) {
  if (typeof NTFY_TOPIC === 'undefined' || !NTFY_TOPIC || NTFY_TOPIC === 'YOUR_NTFY_TOPIC') return;
  try {
    await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
      method: 'POST',
      headers: { 'Title': encodeURIComponent(title), 'Content-Type': 'text/plain; charset=utf-8' },
      body: body || title,
    });
  } catch(e) { console.warn('Ntfy送信失敗:', e); }
}

// ===== STATE =====
let reminders = [];
let currentFilter = 'all';
let currentCategory = null;
let editingId = null;

const CATEGORY_COLORS = {
  '仕事': { color: '#7aaee8', bg: 'var(--blue-bg)', border: 'rgba(122,174,232,0.3)' },
  'プライベート': { color: '#7ae8a4', bg: 'var(--green-bg)', border: 'rgba(122,232,164,0.3)' },
  '健康': { color: '#e87a7a', bg: 'var(--red-bg)', border: 'rgba(232,122,122,0.3)' },
  'その他': { color: '#b07ae8', bg: 'var(--purple-bg)', border: 'rgba(176,122,232,0.3)' },
};
const REPEAT_LABELS = { none: '', daily: '毎日', weekdays: '平日のみ', weekly: '毎週', monthly: '毎月' };

// ===== STORAGE =====
async function loadReminders() {
  if (useLocalStorage) {
    reminders = JSON.parse(localStorage.getItem('reminders') || '[]');
  } else {
    const { data, error } = await supabase.from('reminders').select('*').order('datetime', { ascending: true });
    if (!error && data) reminders = data;
  }
  renderAll();
  scheduleLocalNotifications();
}

async function saveToStorage(reminder) {
  if (useLocalStorage) {
    const idx = reminders.findIndex(r => r.id === reminder.id);
    if (idx >= 0) reminders[idx] = reminder;
    else reminders.push(reminder);
    localStorage.setItem('reminders', JSON.stringify(reminders));
  } else {
    const { error } = await supabase.from('reminders').upsert(reminder);
    if (error) { showToast('保存エラー: ' + error.message, '❌'); return; }
  }
  await loadReminders();
}

async function deleteFromStorage(id) {
  if (useLocalStorage) {
    reminders = reminders.filter(r => r.id !== id);
    localStorage.setItem('reminders', JSON.stringify(reminders));
  } else {
    const { error } = await supabase.from('reminders').delete().eq('id', id);
    if (error) { showToast('削除エラー: ' + error.message, '❌'); return; }
  }
  await loadReminders();
}

// ===== RENDER =====
function getFilteredReminders() {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  let list = [...reminders];

  if (currentCategory) {
    list = list.filter(r => r.category === currentCategory);
  }

  switch(currentFilter) {
    case 'pending': return list.filter(r => !r.done);
    case 'done':    return list.filter(r => r.done);
    case 'today':   return list.filter(r => r.datetime && r.datetime.slice(0,10) === todayStr);
    default:        return list;
  }
}

function renderAll() {
  const grid = document.getElementById('cardGrid');
  const list = getFilteredReminders();

  // stats
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  document.getElementById('statTotal').textContent = reminders.length;
  document.getElementById('statToday').textContent = reminders.filter(r => r.datetime && r.datetime.slice(0,10) === todayStr).length;
  document.getElementById('statDone').textContent = reminders.filter(r => r.done).length;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🗓️</div>
      <div class="empty-title">リマインダーがありません</div>
      <div class="empty-sub">右上の「＋ 追加」から作成しましょう</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(r => {
    const cat = CATEGORY_COLORS[r.category] || CATEGORY_COLORS['その他'];
    const dateLabel = r.datetime ? formatDate(r.datetime) : '';
    const repeatLabel = REPEAT_LABELS[r.repeat] || '';
    return `
    <div class="reminder-card ${r.done ? 'done' : ''}" style="--card-accent:${cat.color}">
      <div class="card-header">
        <div class="card-title ${r.done ? 'done' : ''}">${escHtml(r.title)}</div>
        <div class="card-check ${r.done ? 'checked' : ''}" onclick="toggleDone('${r.id}')">
          ${r.done ? '✓' : ''}
        </div>
      </div>
      ${r.note ? `<div style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.5">${escHtml(r.note)}</div>` : ''}
      <div class="card-meta">
        ${dateLabel ? `<span class="badge badge-time">📅 ${dateLabel}</span>` : ''}
        ${repeatLabel ? `<span class="badge badge-repeat">🔁 ${repeatLabel}</span>` : ''}
        <span class="badge badge-cat" style="background:${cat.bg};color:${cat.color};border-color:${cat.border}">${r.category || 'その他'}</span>
      </div>
      <div class="card-actions">
        <div class="icon-btn" onclick="editReminder('${r.id}')">✎</div>
        <div class="icon-btn" onclick="deleteReminder('${r.id}')">✕</div>
      </div>
    </div>`;
  }).join('');
}

function formatDate(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const isTomorrow = d.toDateString() === new Date(now.getTime()+86400000).toDateString();
  const timeStr = d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  if (isToday) return `今日 ${timeStr}`;
  if (isTomorrow) return `明日 ${timeStr}`;
  return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }) + ' ' + timeStr;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== MODAL =====
function openModal(reminder) {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新しいリマインダー';
  document.getElementById('fTitle').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fRepeat').value = 'none';
  document.getElementById('fCategory').value = '仕事';
  const now = new Date();
  document.getElementById('fDate').value = now.toISOString().slice(0,10);
  document.getElementById('fTime').value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 200);
}

function editReminder(id) {
  const r = reminders.find(r => r.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'リマインダーを編集';
  document.getElementById('fTitle').value = r.title;
  document.getElementById('fNote').value = r.note || '';
  document.getElementById('fRepeat').value = r.repeat || 'none';
  document.getElementById('fCategory').value = r.category || 'その他';
  if (r.datetime) {
    document.getElementById('fDate').value = r.datetime.slice(0,10);
    document.getElementById('fTime').value = r.datetime.slice(11,16);
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveReminder() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }

  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const datetime = date ? `${date}T${time || '09:00'}` : null;

  const reminder = {
    id: editingId || crypto.randomUUID(),
    title,
    note: document.getElementById('fNote').value.trim(),
    datetime,
    repeat: document.getElementById('fRepeat').value,
    category: document.getElementById('fCategory').value,
    done: editingId ? (reminders.find(r=>r.id===editingId)?.done || false) : false,
    created_at: editingId ? (reminders.find(r=>r.id===editingId)?.created_at || new Date().toISOString()) : new Date().toISOString(),
  };

  await saveToStorage(reminder);
  closeModal();
  showToast(editingId ? '更新しました' : '追加しました', '✓');
}

async function toggleDone(id) {
  const r = reminders.find(r => r.id === id);
  if (!r) return;
  await saveToStorage({ ...r, done: !r.done });
}

async function deleteReminder(id) {
  if (!confirm('このリマインダーを削除しますか？')) return;
  await deleteFromStorage(id);
  showToast('削除しました', '🗑️');
}

// ===== FILTERS =====
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function filterView(view) {
  currentCategory = null;
  currentFilter = view === 'done' ? 'done' : view === 'today' ? 'today' : 'all';
  document.getElementById('viewTitle').textContent =
    view === 'all' ? 'すべてのリマインダー' :
    view === 'today' ? '今日のリマインダー' :
    view === 'upcoming' ? '近日中' : '完了済み';
  renderAll();
}

function filterCategory(cat) {
  currentCategory = cat;
  currentFilter = 'all';
  document.getElementById('viewTitle').textContent = cat;
  renderAll();
}

// ===== NOTIFICATIONS =====
async function requestNotifPermission() {
  if (!('Notification' in window)) { showToast('このブラウザは通知非対応です', '⚠️'); return; }
  const perm = await Notification.requestPermission();
  updateNotifStatus();
  if (perm === 'granted') {
    showToast('通知を有効にしました！', '🔔');
    scheduleLocalNotifications();
  } else {
    showToast('通知が拒否されました', '⚠️');
  }
}

function updateNotifStatus() {
  const dot = document.getElementById('notifDot');
  const label = document.getElementById('notifLabel');
  if (!('Notification' in window)) { label.textContent = '通知: 非対応'; return; }
  if (Notification.permission === 'granted') {
    dot.classList.add('active');
    label.textContent = '通知: 有効';
  } else {
    dot.classList.remove('active');
    label.textContent = '通知: ' + (Notification.permission === 'denied' ? '拒否済み' : '未設定');
  }
}

// ブラウザのローカル通知スケジューラー
const scheduledTimers = [];
function scheduleLocalNotifications() {
  scheduledTimers.forEach(t => clearTimeout(t));
  scheduledTimers.length = 0;
  if (Notification.permission !== 'granted') return;

  const now = Date.now();
  reminders.filter(r => !r.done && r.datetime).forEach(r => {
    const dt = new Date(r.datetime).getTime();
    const diff = dt - now;
    if (diff > 0 && diff < 7 * 24 * 60 * 60 * 1000) { // 7日以内
      const t = setTimeout(() => {
        // ブラウザ通知
        if (Notification.permission === 'granted') {
          new Notification('📌 ' + r.title, {
            body: r.note || r.category,
            icon: 'icon-192.png',
          });
        }
        // Ntfy通知（iPhoneにも届く）
        sendNtfyNotification('📌 ' + r.title, r.note || r.category || '');
      }, diff);
      scheduledTimers.push(t);
    }
  });
}

// ===== TOAST =====
function showToast(msg, icon = '✓') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icon}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('modalOverlay').classList.contains('open')) saveReminder();
  }
});

// モーダル外クリックで閉じる
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ===== INIT =====
loadReminders();
updateNotifStatus();
</script>
